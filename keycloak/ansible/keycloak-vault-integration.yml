# Playbook to configure and manage Vault integration.
---
- name: Manage Keycloak configurations for Vault
  hosts: containers
  become: true

  vars_files:
    - secrets.yml

  vars:
    keycloak_version: "26.2.4"
    keycloak_symlink: "/opt/keycloak"
    keycloak_admin_user: "admin"
    keycloak_realm_name: "homelab"

    # Vault client details
    keycloak_vault_client_id: "vault"
    keycloak_vault_redirect_uri: "https://vault.jayforweb.com/ui/vault/auth/oidc/oidc/callback"
    keycloak_vault_web_origin: "https://vault.jayforweb.com/ui/vault/auth/oidc/oidc/callback"

    # User and Group details
    vault_admin_username: "vault-admin"
    vault_admin_email: "vault-admin@jayforweb.com"
    vault_admin_first_name: "Jay"
    vault_admin_last_name: "Amaranayake"
    vault_admins_group_name: "vault-admins"
    vault_users_group_name: "vault-users"
    vault_group_membership_mapper_name: "groups"
    vault_group_membership_token_claim_name: "groups"

  tasks:
    - name: Authenticate to Keycloak Admin CLI
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" config credentials \
          --server "http://localhost:8080/" \
          --realm master \
          --user "{{ keycloak_admin_user }}" \
          --password "{{ keycloak_admin_password }}" \
          --client admin-cli
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      changed_when: false
      no_log: true

    # --- Keycloak Client --------

    - name: Ensure vault client exists in 'homelab' realm
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" create clients -r {{ keycloak_realm_name }} -f - <<EOF
        {
          "clientId": "{{ keycloak_vault_client_id }}",
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "{{ vault_keycloak_client_secret }}",
          "redirectUris": [
            "{{ keycloak_vault_redirect_uri }}"
          ],
          "webOrigins": [
            "{{ keycloak_vault_web_origin }}"
          ],
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "fullScopeAllowed": true,
          "clientAuthenticatorType": "client-secret",
          "consentRequired": false,
          "attributes": {
            "realm_client": "false",
            "oidc.ciba.grant.enabled": "false",
            "backchannel.logout.session.required": "true",
            "standard.token.exchange.enabled": "false",
            "oauth2.device.authorization.grant.enabled": "false",
            "display.on.consent.screen": "false",
            "backchannel.logout.revoke.offline.tokens": "false"
          }
        }
        EOF
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: create_vault_client
      failed_when: "'already exists' not in create_vault_client.stderr and create_vault_client.rc != 0"
      changed_when: create_vault_client.rc == 0 and 'Created client' in create_vault_client.stdout

    - name: Get vault client internal ID
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" get clients -r {{ keycloak_realm_name }} \
          -q exact=true -q clientId={{ keycloak_vault_client_id }} \
          --fields id --format csv --noquotes
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: vault_client_id_query
      changed_when: false

    - name: Set fact for vault client internal ID
      ansible.builtin.set_fact:
        vault_client_internal_id: "{{ vault_client_id_query.stdout | trim }}"

    # --- Protocol Mapper via REST API (kcadm.sh silently drops config in Keycloak 26.x) --------

    - name: Get Keycloak admin token for REST API calls
      ansible.builtin.uri:
        url: "http://localhost:8080/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          username: "{{ keycloak_admin_user }}"
          password: "{{ keycloak_admin_password }}"
          grant_type: "password"
          client_id: "admin-cli"
        status_code: 200
      register: kc_token
      no_log: true

    - name: Get existing protocol mappers for vault client
      ansible.builtin.uri:
        url: "http://localhost:8080/admin/realms/{{ keycloak_realm_name }}/clients/{{ vault_client_internal_id }}/protocol-mappers/models"
        method: GET
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
        status_code: 200
      register: vault_mappers

    - name: Delete existing groups mapper if present
      ansible.builtin.uri:
        url: "http://localhost:8080/admin/realms/{{ keycloak_realm_name }}/clients/{{ vault_client_internal_id }}/protocol-mappers/models/{{ item.id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
        status_code: [204, 404]
      loop: "{{ vault_mappers.json | selectattr('name', 'equalto', vault_group_membership_mapper_name) | list }}"

    - name: Create groups protocol mapper for vault client via REST API
      ansible.builtin.uri:
        url: "http://localhost:8080/admin/realms/{{ keycloak_realm_name }}/clients/{{ vault_client_internal_id }}/protocol-mappers/models"
        method: POST
        headers:
          Authorization: "Bearer {{ kc_token.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ vault_group_membership_mapper_name }}"
          protocol: "openid-connect"
          protocolMapper: "oidc-group-membership-mapper"
          consentRequired: false
          config:
            "full.path": "false"
            "introspection.token.claim": "true"
            "multivalued": "true"
            "userinfo.token.claim": "true"
            "id.token.claim": "true"
            "lightweight.claim": "false"
            "access.token.claim": "true"
            "claim.name": "groups"
        status_code: 201

    # --- Keycloak Groups --------

    - name: Ensure 'vault-admins' group exists in 'homelab' realm
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" create groups \
          -r {{ keycloak_realm_name }} \
          -s name={{ vault_admins_group_name }}
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: create_vault_admins_group
      failed_when: "'already exists' not in create_vault_admins_group.stderr and create_vault_admins_group.rc != 0"
      changed_when: create_vault_admins_group.rc == 0 and 'Created group' in create_vault_admins_group.stdout

    - name: Ensure 'vault-users' group exists in 'homelab' realm
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" create groups \
          -r {{ keycloak_realm_name }} \
          -s name={{ vault_users_group_name }}
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: create_vault_users_group
      failed_when: "'already exists' not in create_vault_users_group.stderr and create_vault_users_group.rc != 0"
      changed_when: create_vault_users_group.rc == 0 and 'Created group' in create_vault_users_group.stdout

    # --- Keycloak Users --------

    - name: Check if 'vault-admin' user exists in 'homelab' realm
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" get users -r {{ keycloak_realm_name }} \
          -q exact=true -q username={{ vault_admin_username }} \
          --fields id --format csv --noquotes
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: vault_admin_user_exists_check
      changed_when: false
      failed_when: false

    - name: Create 'vault-admin' user in 'homelab' realm if it doesn't exist
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" create users -r {{ keycloak_realm_name }} -f - <<EOF
        {
          "username": "{{ vault_admin_username }}",
          "email": "{{ vault_admin_email }}",
          "firstName": "{{ vault_admin_first_name }}",
          "lastName": "{{ vault_admin_last_name }}",
          "enabled": true,
          "emailVerified": true
        }
        EOF
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: create_vault_admin_user
      when: vault_admin_user_exists_check.stdout == ""
      changed_when: create_vault_admin_user.rc == 0 and 'Created user' in create_vault_admin_user.stdout

    - name: Set initial password for 'vault-admin' user
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" set-password -r {{ keycloak_realm_name }} \
          --username {{ vault_admin_username }} \
          --new-password "{{ vault_admin_password }}"
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      no_log: true
      changed_when: false

    - name: Get 'vault-admin' user internal ID
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" get users -r {{ keycloak_realm_name }} \
          -q exact=true -q username={{ vault_admin_username }} \
          --fields id --format csv --noquotes
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: vault_admin_user_id_query
      changed_when: false

    - name: Get 'vault-admins' group internal ID
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" get groups -r {{ keycloak_realm_name }} \
          -q exact=true -q search={{ vault_admins_group_name }} \
          --fields id --format csv --noquotes
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: vault_admins_group_id_query
      changed_when: false

    - name: Add 'vault-admin' user to 'vault-admins' group
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" update \
          users/{{ vault_admin_user_id_query.stdout }}/groups/{{ vault_admins_group_id_query.stdout }} \
          -r {{ keycloak_realm_name }} \
          -s "userId={{ vault_admin_user_id_query.stdout }}" \
          -s "groupId={{ vault_admins_group_id_query.stdout }}" \
          --no-merge
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      register: add_user_to_group_result
      changed_when: add_user_to_group_result.rc == 0
      failed_when: add_user_to_group_result.rc != 0 and 'User is already member of group' not in add_user_to_group_result.stderr and 'already exists' not in add_user_to_group_result.stderr