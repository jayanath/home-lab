# Playbook to manage homelab users in Keycloak.
# Users are defined in users.yml, passwords in secrets.yml (ansible-vault).
# Groups must already exist — run keycloak-*-integration.yml playbooks first.
---
- name: Manage Keycloak homelab users
  hosts: containers
  become: true

  vars_files:
    - secrets.yml
    - users.yml

  vars:
    keycloak_symlink: "/opt/keycloak"
    keycloak_admin_user: "admin"
    keycloak_realm_name: "homelab"

  tasks:
    - name: Authenticate to Keycloak Admin CLI
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" config credentials \
          --server "http://localhost:8080/" \
          --realm master \
          --user "{{ keycloak_admin_user }}" \
          --password "{{ keycloak_admin_password }}" \
          --client admin-cli
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      changed_when: false
      no_log: true

    # ── Users ─────────────────────────────────────────────────────────────────

    - name: Check if user exists in 'homelab' realm
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" get users -r {{ keycloak_realm_name }} \
          -q exact=true -q username={{ item.username }} \
          --fields id --format csv --noquotes
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ homelab_users }}"
      loop_control:
        label: "{{ item.username }}"
      register: user_exists_check
      changed_when: false
      failed_when: false

    - name: Create user if it does not exist
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" create users -r {{ keycloak_realm_name }} -f - <<EOF
        {
          "username": "{{ item.item.username }}",
          "email": "{{ item.item.email }}",
          "firstName": "{{ item.item.first_name }}",
          "lastName": "{{ item.item.last_name }}",
          "enabled": {{ item.item.enabled | lower }},
          "emailVerified": true
        }
        EOF
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ user_exists_check.results }}"
      loop_control:
        label: "{{ item.item.username }}"
      when: item.stdout == ""
      register: create_user
      changed_when: create_user.rc == 0 and 'Created user' in create_user.stdout

    - name: Update user details if user already exists
      ansible.builtin.shell: |
        USER_ID=$("{{ keycloak_symlink }}/bin/kcadm.sh" get users -r {{ keycloak_realm_name }} \
          -q exact=true -q username={{ item.item.username }} \
          --fields id --format csv --noquotes)
        "{{ keycloak_symlink }}/bin/kcadm.sh" update users/${USER_ID} -r {{ keycloak_realm_name }} -f - <<EOF
        {
          "email": "{{ item.item.email }}",
          "firstName": "{{ item.item.first_name }}",
          "lastName": "{{ item.item.last_name }}",
          "enabled": {{ item.item.enabled | lower }},
          "emailVerified": true
        }
        EOF
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ user_exists_check.results }}"
      loop_control:
        label: "{{ item.item.username }}"
      when: item.stdout != ""
      changed_when: true

    - name: Set password for each user
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" set-password -r {{ keycloak_realm_name }} \
          --username {{ item.username }} \
          --new-password "{{ item.password }}"
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ homelab_users }}"
      loop_control:
        label: "{{ item.username }}"
      no_log: true
      changed_when: false

    # ── Resolve user internal IDs ─────────────────────────────────────────────

    - name: Get user internal IDs
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" get users -r {{ keycloak_realm_name }} \
          -q exact=true -q username={{ item.username }} \
          --fields id --format csv --noquotes
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ homelab_users }}"
      loop_control:
        label: "{{ item.username }}"
      register: user_id_results
      changed_when: false

    - name: Build username → internal ID map
      ansible.builtin.set_fact:
        user_id_map: >-
          {{
            user_id_map | default({}) | combine({
              item.item.username: item.stdout | trim
            })
          }}
      loop: "{{ user_id_results.results }}"
      loop_control:
        label: "{{ item.item.username }}"

    # ── Gitea group assignments ───────────────────────────────────────────────

    - name: Get Gitea group internal IDs
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" get groups -r {{ keycloak_realm_name }} \
          -q exact=true -q search={{ item }} \
          --fields id --format csv --noquotes
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ homelab_users | map(attribute='gitea_groups') | flatten | unique }}"
      register: gitea_group_id_results
      changed_when: false
      when: homelab_users | map(attribute='gitea_groups') | flatten | length > 0

    - name: Build Gitea group name → internal ID map
      ansible.builtin.set_fact:
        gitea_group_id_map: >-
          {{
            gitea_group_id_map | default({}) | combine({
              item.item: item.stdout | trim
            })
          }}
      loop: "{{ gitea_group_id_results.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: gitea_group_id_results.results is defined

    - name: Assign users to Gitea groups
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" update \
          users/{{ user_id_map[item.0.username] }}/groups/{{ gitea_group_id_map[item.1] }} \
          -r {{ keycloak_realm_name }} \
          -s "userId={{ user_id_map[item.0.username] }}" \
          -s "groupId={{ gitea_group_id_map[item.1] }}" \
          --no-merge
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ homelab_users | subelements('gitea_groups') }}"
      loop_control:
        label: "{{ item.0.username }} → {{ item.1 }}"
      register: gitea_group_assign
      changed_when: gitea_group_assign.rc == 0
      failed_when: >
        gitea_group_assign.rc != 0 and
        'User is already member of group' not in gitea_group_assign.stderr and
        'already exists' not in gitea_group_assign.stderr
      when: gitea_group_id_map is defined

    # ── Vault group assignments ───────────────────────────────────────────────

    - name: Get Vault group internal IDs
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" get groups -r {{ keycloak_realm_name }} \
          -q exact=true -q search={{ item }} \
          --fields id --format csv --noquotes
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ homelab_users | map(attribute='vault_groups') | flatten | unique }}"
      register: vault_group_id_results
      changed_when: false
      when: homelab_users | map(attribute='vault_groups') | flatten | length > 0

    - name: Build Vault group name → internal ID map
      ansible.builtin.set_fact:
        vault_group_id_map: >-
          {{
            vault_group_id_map | default({}) | combine({
              item.item: item.stdout | trim
            })
          }}
      loop: "{{ vault_group_id_results.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: vault_group_id_results.results is defined

    - name: Assign users to Vault groups
      ansible.builtin.shell: |
        "{{ keycloak_symlink }}/bin/kcadm.sh" update \
          users/{{ user_id_map[item.0.username] }}/groups/{{ vault_group_id_map[item.1] }} \
          -r {{ keycloak_realm_name }} \
          -s "userId={{ user_id_map[item.0.username] }}" \
          -s "groupId={{ vault_group_id_map[item.1] }}" \
          --no-merge
      args:
        chdir: "{{ keycloak_symlink }}/bin"
      loop: "{{ homelab_users | subelements('vault_groups') }}"
      loop_control:
        label: "{{ item.0.username }} → {{ item.1 }}"
      register: vault_group_assign
      changed_when: vault_group_assign.rc == 0
      failed_when: >
        vault_group_assign.rc != 0 and
        'User is already member of group' not in vault_group_assign.stderr and
        'already exists' not in vault_group_assign.stderr
      when: vault_group_id_map is defined