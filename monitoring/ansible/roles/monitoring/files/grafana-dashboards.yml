# Grafana dashboard provider — managed by Ansible, do not edit manually.
# Drop any dashboard JSON file into /var/lib/grafana/dashboards/ and
# Grafana will auto-load it within 30 seconds.
apiVersion: 1

providers:
  - name: homelab-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
