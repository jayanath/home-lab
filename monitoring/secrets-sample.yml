# Sample content of the secrets file.
# Use ansible-vault --help to find more info.
# ansible-vault encrypt secrets-sample.yml to encrypt the file with a password.
---

# InfluxDB admin credentials
monitoring_influxdb_admin_user: "admin"
monitoring_influxdb_admin_password: "your_secure_influxdb_password"

# InfluxDB operator token — used by Telegraf and Grafana.
# Generate with: openssl rand -base64 48 | tr -d '\n'
# This is set explicitly at influx setup so it's known ahead of time.
monitoring_influxdb_operator_token: "your_generated_influxdb_token=="

# NUT client password — must match upsmon_client password in /etc/nut/upsd.users on the NUT server
nut_client_password: "your_nut_client_password"
